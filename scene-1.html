<title>AI Kitchen Laboratory — Customer Details</title>

<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Inter',sans-serif;background:#FAF8F4;color:#1A1A18;font-size:16px}
.wrap{max-width:580px;margin:0 auto;padding:1.25rem}
.hero{background:#1565C0;border-radius:14px;padding:1.31rem 1.5rem;margin-bottom:1.5rem;text-align:center}
.hero-label{font-size:11px;color:#90CAF9;letter-spacing:.1em;text-transform:uppercase;margin-bottom:.6rem;font-weight:500}
.slbl{font-size:13px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.07em;margin-bottom:.5rem;margin-top:1.1rem;display:block}
input[type="text"],input[type="email"],input[type="tel"],select{width:100%;padding:.75rem;border:1.5px solid rgba(26,26,24,.12);border-radius:10px;font-family:'Inter',sans-serif;font-size:.95rem;background:#fff;color:#1A1A18;margin-bottom:.5rem}
input[type="text"]:focus,input[type="email"]:focus,input[type="tel"]:focus,select:focus{outline:none;border-color:#1565C0;background:#f9f9f9}
select{cursor:pointer}
.country-select{margin-bottom:1rem}
.form-group{margin-bottom:1rem}
.divider{height:1px;background:rgba(26,26,24,.08);margin:1.1rem 0}
.fft{background:#fff;border:1.5px solid rgba(26,26,24,.1);border-radius:14px;padding:1.1rem;margin-bottom:1.25rem}
.fft img{height:28px;width:auto;display:block;margin-bottom:.5rem}
.fft p{font-size:.8rem;color:#777;margin-bottom:.65rem;line-height:1.55}
.err{background:#FAEAEA;border:1px solid #D85A5A;border-radius:10px;padding:1rem;margin-bottom:1rem;font-size:.88rem;color:#A32D2D;display:none}
.err.on{display:block}
.success{background:#E8F5E9;border:1px solid #66BB6A;border-radius:10px;padding:1rem;margin-bottom:1rem;font-size:.88rem;color:#2E7D32;display:none}
.success.on{display:block}
.note{font-size:.72rem;color:#aaa;text-align:center;margin-bottom:1.5rem;margin-top:.5rem}
.btn-blue{width:100%;padding:1rem;background:#1565C0;color:#fff;border:none;border-radius:12px;font-size:1rem;font-weight:600;cursor:pointer;display:block;text-align:center;margin-bottom:.65rem;transition:all .2s}
.btn-blue:hover{background:#0D47A1}
.btn-blue:disabled{opacity:.6;cursor:not-allowed}
.loading{display:none}
.loading.on{display:inline}
</style>
</head>

function initCountries(){
  var select=document.getElementById('countrySelect');
  select.innerHTML='';
  
  var featured=['United States','United Kingdom','Canada','Australia','Spain'];
  var europe=[];
  var asia=[];
  var other=[];
  
  Object.keys(countryData).forEach(function(c){
    if(featured.indexOf(c)===-1){
      if(countryData[c].region==='Europe'){europe.push(c);}
      else if(countryData[c].region==='Asia'){asia.push(c);}
      else{other.push(c);}
    }
  });
  
  europe.sort();
  asia.sort();
  other.sort();
  
  featured.forEach(function(c){
    var opt=document.createElement('option');
    opt.value=c;
    opt.textContent=c;
    select.appendChild(opt);
  });
  
  if(europe.length>0){
    var eg=document.createElement('optgroup');
    eg.label='Europe';
    europe.forEach(function(c){
      var opt=document.createElement('option');
      opt.value=c;
      opt.textContent=c;
      eg.appendChild(opt);
    });
    select.appendChild(eg);
  }
  
  if(asia.length>0){
    var ag=document.createElement('optgroup');
    ag.label='Asia';
    asia.forEach(function(c){
      var opt=document.createElement('option');
      opt.value=c;
      opt.textContent=c;
      ag.appendChild(opt);
    });
    select.appendChild(ag);
  }
  
  if(other.length>0){
    var og=document.createElement('optgroup');
    og.label='Other';
    other.forEach(function(c){
      var opt=document.createElement('option');
      opt.value=c;
      opt.textContent=c;
      og.appendChild(opt);
    });
    select.appendChild(og);
  }
}

function updateCountryCode(){
  var country=document.getElementById('countrySelect').value;
  if(countryData[country]){
    document.getElementById('countryCode').value=countryData[country].code;
  }
}

function detectCountry(callback){
  fetch('https://ipapi.co/json/').then(function(r){return r.json()}).then(function(data){
    var country=data.country_name;
    var detectedCountry=country;
    var select=document.getElementById('countrySelect');
    for(var i=0;i<select.options.length;i++){
      if(select.options[i].value===country){
        select.value=country;
        updateCountryCode();
        var msg=document.getElementById('locationMsg');
        msg.textContent='Detected: '+country+' ('+data.country_code+')';
        msg.style.display='block';
        break;
      }
    }
    if(callback)callback();
  }).catch(function(e){
    console.log('Country detection failed');
    if(callback)callback();
  });
}

function showErr(msg){
  document.getElementById('errBox').textContent=msg||'Something went wrong — please try again.';
  document.getElementById('errBox').classList.add('on');
}

function hideErr(){
  document.getElementById('errBox').classList.remove('on');
}

function showSuccess(){
  document.getElementById('successBox').classList.add('on');
}

function submitForm(){
  hideErr();
  var email=document.getElementById('email').value.trim();
  var phone=document.getElementById('phone').value.trim();
  var country=document.getElementById('countrySelect').value;
  var code=document.getElementById('countryCode').value;
  
  if(!email){showErr('Please enter your email');return}
  if(!email.includes('@')){showErr('Please enter a valid email');return}
  if(!phone){showErr('Please enter your phone');return}
  if(!country){showErr('Please select your country');return}
  
  var btn=document.getElementById('submitBtn');
  btn.disabled=true;
  document.getElementById('btnText').style.display='none';
  document.getElementById('btnLoading').classList.add('on');
  
  var data={
    email:email,
    phone:code+phone,
    country:country,
    country_code:countryData[country].code_alpha,
    timestamp:new Date().toISOString()
  };
  
  showSuccess();
  setTimeout(function(){
    btn.disabled=false;
    document.getElementById('btnText').style.display='block';
    document.getElementById('btnLoading').classList.remove('on');
  },1000);
}

window.onload=function(){
  initCountries();
  updateCountryCode();
  detectCountry(function(){
    updateCountryCode();
  });
};
