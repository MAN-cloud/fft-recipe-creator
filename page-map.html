<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Free From That — Recipe Map</title>

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Georgia', serif;
      background: #0d1117;
      color: #fff;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    #header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 20px;
      background: #ffffff;
      border-bottom: 1px solid #e0e0e0;
      z-index: 1000;
      flex-shrink: 0;
    }

    #header img {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      object-fit: cover;
      background: #fff;
    }

    #header-text h1 {
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: #17587E;
      text-transform: uppercase;
    }

    #header-text p {
      font-size: 0.72rem;
      color: #666;
      font-style: italic;
      margin-top: 1px;
    }

    /* ── Map container ── */
    #map {
      flex: 1;
      width: 100%;
    }

    /* ── Loading overlay ── */
    #loading-overlay {
      position: absolute;
      inset: 0;
      background: #0d1117;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 2000;
      gap: 16px;
      transition: opacity 0.5s ease;
    }

    #loading-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .loading-star {
      font-size: 2.5rem;
      animation: spin 1.8s linear infinite;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    #loading-overlay p {
      color: #7a9ab0;
      font-size: 0.9rem;
      letter-spacing: 0.05em;
    }

    /* ── Continue button ── */
    #continue-btn {
      position: absolute;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1500;
      background: #17587E;
      color: #fff;
      border: none;
      padding: 14px 36px;
      border-radius: 50px;
      font-size: 1rem;
      font-family: 'Georgia', serif;
      letter-spacing: 0.05em;
      cursor: pointer;
      box-shadow: 0 4px 24px rgba(23, 88, 126, 0.5);
      transition: background 0.2s, transform 0.1s;
      display: none;
    }

    #continue-btn:hover {
      background: #1a6fa0;
      transform: translateX(-50%) scale(1.03);
    }

    /* ── Leaflet popup styling ── */
    .leaflet-popup-content-wrapper {
      background: #0f1e2a !important;
      color: #f5c842 !important;
      border: 1px solid #f5c842 !important;
      border-radius: 10px !important;
      box-shadow: 0 0 16px rgba(245, 200, 66, 0.35) !important;
      font-family: 'Georgia', serif !important;
    }

    .leaflet-popup-tip {
      background: #f5c842 !important;
    }

    .leaflet-popup-content {
      font-size: 0.88rem !important;
      font-style: italic !important;
      margin: 8px 14px !important;
      color: #f5c842 !important;
    }

    .leaflet-popup-close-button {
      color: #f5c842 !important;
    }

    /* ── Pin count badge ── */
    #pin-count {
      position: absolute;
      top: 76px;
      right: 16px;
      z-index: 1000;
      background: rgba(13, 17, 23, 0.85);
      border: 1px solid #1e2a35;
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 0.75rem;
      color: #7a9ab0;
      display: none;
    }

    #pin-count span {
      color: #f5c842;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <!-- Header -->
  <div id="header">
    <img src="https://cdn.jsdelivr.net/gh/MAN-cloud/fft-recipe-creator@main/FFT_NEW_LOGO_TRANSPARENT.png"
         onerror="this.src='https://lh3.googleusercontent.com/d/1-U0QpuzEn9x5gDX2WtHSMfns4v3mp5bj=s200'"
         alt="FFT Logo" />
    <div id="header-text">
      <h1>✨ My Recipe Maker</h1>
      <p>Recipes cooking around the world</p>
    </div>
  </div>

  <!-- Map -->
  <div id="map"></div>

  <!-- Pin count -->
  <div id="pin-count">Showing <span id="count-num">0</span> recipes worldwide</div>

  <!-- Loading overlay -->
  <div id="loading-overlay">
    <div class="loading-star">🌟</div>
    <p>Mapping recipes around the world…</p>
  </div>

  <!-- Continue button -->
  <button id="continue-btn" onclick="goNext()">View Your Recipe →</button>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script>
    // ── Config ──────────────────────────────────────────────
    const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxiBmw7MH9--VlC3VDcwmPuRP27KPzGKETt3uIqOr0qMe1OuBo9CY6Z4A8hEXsr3IQT4A/exec';

    // ── Init map ────────────────────────────────────────────
    const map = L.map('map', {
      zoomControl: true,
      attributionControl: true,
      scrollWheelZoom: true
    });

    // CartoDB Dark Matter tiles
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
      attribution: '&copy; <a href="https://carto.com/">CARTO</a>',
      subdomains: 'abcd',
      maxZoom: 19
    }).addTo(map);

    // ── Yellow glowing pin icon ─────────────────────────────
    const yellowPin = L.divIcon({
      className: '',
      html: `
        <div style="
          width: 18px;
          height: 18px;
          background: #f5c842;
          border-radius: 50%;
          border: 3px solid #fff5cc;
          box-shadow:
            0 0 8px 3px rgba(245,200,66,0.85),
            0 0 20px 6px rgba(245,200,66,0.4);
          cursor: pointer;
        "></div>`,
      iconSize: [18, 18],
      iconAnchor: [9, 9],
      popupAnchor: [0, -14]
    });

    // ── Fetch customers & place pins ────────────────────────
    async function loadPins() {
      try {
        const res = await fetch(`${APPS_SCRIPT_URL}?action=getCustomers&t=${Date.now()}`);
        const data = await res.json();

        const customers = Array.isArray(data) ? data : (data.customers || data.data || []);
        const valid = customers.filter(c => c.lat && c.lng && !isNaN(parseFloat(c.lat)));

        if (valid.length === 0) {
          // No real data — show demo pins so map isn't empty
          placeDemoPins();
          return;
        }

        const bounds = [];

        valid.forEach(c => {
          const lat = parseFloat(c.lat);
          const lng = parseFloat(c.lng);
          const dish = c.dish || c.recipe || c.dishName || '✨ Vegan Recipe';

          const marker = L.marker([lat, lng], { icon: yellowPin }).addTo(map);
          marker.bindPopup(`<strong>${dish}</strong>`);
          bounds.push([lat, lng]);
        });

        // Auto-zoom to fit all pins
        if (bounds.length > 0) {
          map.fitBounds(bounds, { padding: [60, 60], maxZoom: 10 });
        }

        showPinCount(valid.length);

      } catch (err) {
        console.warn('Could not load customers, showing demo pins:', err);
        placeDemoPins();
      } finally {
        hideLoading();
      }
    }

    // ── Demo pins (fallback if no data yet) ─────────────────
    function placeDemoPins() {
      const demos = [
        { lat: 43.53573, lng: -5.66152, dish: '✨ Vegan Eclairs' },      // Gijón
        { lat: 51.5074,  lng: -0.1278,  dish: '🍰 Vegan Cheesecake' },   // London
        { lat: 48.8566,  lng: 2.3522,   dish: '🎀 Macarons' },           // Paris
        { lat: 40.4168,  lng: -3.7038,  dish: '☁️ Chocolate Mousse' },   // Madrid
        { lat: 52.3676,  lng: 4.9041,   dish: '✨ Choux Pastry' },       // Amsterdam
        { lat: 41.9028,  lng: 12.4964,  dish: '🍰 Tiramisu Vegan' },     // Rome
        { lat: 37.9838,  lng: 23.7275,  dish: '✨ Baklava Vegan' },      // Athens
        { lat: 40.7128,  lng: -74.0060, dish: '🎀 Macarons NYC' },       // New York
        { lat: -33.8688, lng: 151.2093, dish: '☁️ Pavlova Vegan' },      // Sydney
        { lat: 35.6762,  lng: 139.6503, dish: '✨ Mochi Vegan' },        // Tokyo
      ];

      const bounds = [];

      demos.forEach(d => {
        const marker = L.marker([d.lat, d.lng], { icon: yellowPin }).addTo(map);
        marker.bindPopup(`<strong>${d.dish}</strong>`);
        bounds.push([d.lat, d.lng]);
      });

      map.fitBounds(bounds, { padding: [60, 60], maxZoom: 5 });
      showPinCount(demos.length);
    }

    function showPinCount(n) {
      document.getElementById('count-num').textContent = n;
      document.getElementById('pin-count').style.display = 'block';
    }

    function hideLoading() {
      const overlay = document.getElementById('loading-overlay');
      overlay.classList.add('hidden');
      setTimeout(() => overlay.remove(), 600);

      // Show continue button after a short pause
      setTimeout(() => {
        document.getElementById('continue-btn').style.display = 'block';
      }, 800);
    }

    function goNext() {
      window.location.href = 'page-2.html';
    }

    // ── Start ───────────────────────────────────────────────
    // Small delay so map tiles start loading before fetch
    setTimeout(loadPins, 400);
  </script>
</body>
</html>
