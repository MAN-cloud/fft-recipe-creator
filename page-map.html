<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Creating Your Recipe...</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#f0f4f8;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:20px}
.top-bar{display:flex;align-items:center;gap:12px;margin-bottom:20px;width:100%;max-width:700px}
.logo{width:50px;height:50px;border-radius:50%;overflow:hidden;flex-shrink:0}
.logo img{width:100%;height:100%;object-fit:cover}
.top-text h2{font-size:16px;font-weight:600;color:#17587E;margin:0}
.top-text p{font-size:12px;color:#888;margin:0}
.map-container{width:100%;max-width:700px;background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,0.08);margin-bottom:20px}
.map-header{background:#17587E;padding:14px 20px;display:flex;justify-content:space-between;align-items:center}
.map-header-title{color:#fff;font-size:13px;font-weight:600;letter-spacing:0.5px}
.map-stats{display:flex;gap:16px}
.map-stat{text-align:right}
.map-stat-num{color:#fff;font-size:16px;font-weight:600}
.map-stat-label{color:rgba(255,255,255,0.7);font-size:10px;letter-spacing:0.5px}
#mapSvg{width:100%;display:block;background:#e8f0f7}
.map-footer{padding:12px 20px;background:#f8f8f8;border-top:1px solid #eee;font-size:11px;color:#999;display:flex;justify-content:space-between;align-items:center}
.cooking-bar{width:100%;max-width:700px;background:#fff;border-radius:14px;padding:20px;box-shadow:0 4px 20px rgba(0,0,0,0.08);text-align:center}
.cooking-emoji{font-size:40px;animation:spin 3s linear infinite;display:inline-block;margin-bottom:10px}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.cooking-title{font-size:16px;font-weight:600;color:#17587E;margin-bottom:6px}
.cooking-dish{font-size:14px;color:#333;font-style:italic;margin-bottom:14px}
.progress-bar{width:100%;height:4px;background:#e8e8e8;border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:#17587E;border-radius:2px;animation:progress 20s linear forwards}
@keyframes progress{from{width:0%}to{width:95%}}
.pin{cursor:default}
.pin-ring{animation:pulse 2s ease-out infinite}
@keyframes pulse{0%{opacity:0.6;r:6px}50%{opacity:0.2;r:10px}100%{opacity:0;r:14px}}
</style>
</head>
<body>

<div class="top-bar">
  <div class="logo">
    <img src="https://cdn.jsdelivr.net/gh/MAN-cloud/fft-recipe-creator@main/FFT_NEW_LOGO_TRANSPARENT.png" alt="FFT">
  </div>
  <div class="top-text">
    <h2>FREE FROM THAT</h2>
    <p>MY RECIPE MAKER</p>
  </div>
</div>

<div class="map-container">
  <div class="map-header">
    <div class="map-header-title">🌍 Recipes Made Worldwide</div>
    <div class="map-stats">
      <div class="map-stat">
        <div class="map-stat-num" id="recipeCount">—</div>
        <div class="map-stat-label">RECIPES</div>
      </div>
      <div class="map-stat">
        <div class="map-stat-num" id="countryCount">—</div>
        <div class="map-stat-label">COUNTRIES</div>
      </div>
    </div>
  </div>

  <svg id="mapSvg" viewBox="0 0 700 340" xmlns="http://www.w3.org/2000/svg">
    <!-- Ocean -->
    <rect width="700" height="340" fill="#dce8f3"/>

    <!-- Continents (simplified but recognisable) -->
    <!-- North America -->
    <path d="M 60 60 L 110 50 L 145 65 L 160 90 L 155 120 L 130 145 L 105 160 L 80 155 L 60 130 L 50 100 Z" fill="#c8d8e8"/>
    <!-- Central America -->
    <path d="M 120 160 L 135 170 L 125 190 L 110 185 Z" fill="#c8d8e8"/>
    <!-- South America -->
    <path d="M 130 200 L 160 190 L 175 210 L 180 250 L 170 290 L 145 300 L 125 280 L 115 250 L 120 220 Z" fill="#c8d8e8"/>
    <!-- Europe -->
    <path d="M 310 55 L 340 50 L 360 60 L 355 80 L 340 90 L 320 85 L 305 70 Z" fill="#c8d8e8"/>
    <!-- Africa -->
    <path d="M 320 100 L 355 95 L 375 110 L 380 150 L 370 200 L 350 230 L 330 225 L 315 200 L 310 155 L 315 120 Z" fill="#c8d8e8"/>
    <!-- Asia -->
    <path d="M 370 45 L 450 40 L 530 55 L 560 80 L 545 110 L 510 125 L 470 120 L 430 110 L 400 95 L 375 80 Z" fill="#c8d8e8"/>
    <!-- Middle East -->
    <path d="M 370 95 L 400 90 L 415 110 L 400 130 L 375 125 Z" fill="#c8d8e8"/>
    <!-- India -->
    <path d="M 430 110 L 460 108 L 465 140 L 450 165 L 435 155 L 428 130 Z" fill="#c8d8e8"/>
    <!-- SE Asia -->
    <path d="M 510 120 L 545 115 L 555 135 L 530 145 L 510 140 Z" fill="#c8d8e8"/>
    <!-- Australia -->
    <path d="M 530 200 L 590 195 L 615 215 L 610 250 L 585 265 L 550 258 L 530 240 L 525 215 Z" fill="#c8d8e8"/>
    <!-- UK -->
    <path d="M 308 58 L 316 55 L 318 68 L 310 70 Z" fill="#c8d8e8"/>

    <!-- Grid lines -->
    <line x1="0" y1="170" x2="700" y2="170" stroke="#b8cce0" stroke-width="0.5" stroke-dasharray="4,4"/>
    <line x1="350" y1="0" x2="350" y2="340" stroke="#b8cce0" stroke-width="0.5" stroke-dasharray="4,4"/>

    <!-- Pins group - populated by JS -->
    <g id="pinsGroup"></g>
  </svg>

  <div class="map-footer">
    <span>Pins show where recipes have been created</span>
    <span id="lastUpdate">Loading...</span>
  </div>
</div>

<div class="cooking-bar">
  <div class="cooking-emoji">🌟</div>
  <div class="cooking-title">Chef is creating your recipe...</div>
  <div class="cooking-dish" id="cookingDish"></div>
  <div class="progress-bar"><div class="progress-fill"></div></div>
</div>

<script>
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxiBmw7MH9--VlC3VDcwmPuRP27KPzGKETt3uIqOr0qMe1OuBo9CY6Z4A8hEXsr3IQT4A/exec';
const WORKER_URL = 'https://fft-recipe.man-4bb.workers.dev';

// City to approximate SVG coordinate map
const cityCoords = {
  'London': [312, 65], 'Paris': [322, 72], 'Berlin': [340, 62], 'Madrid': [310, 85],
  'Rome': [345, 85], 'Athens': [355, 90], 'Amsterdam': [325, 60], 'Brussels': [320, 66],
  'Vienna': [345, 68], 'Warsaw': [355, 63], 'Stockholm': [345, 50], 'Oslo': [335, 48],
  'Dublin': [305, 62], 'Lisbon': [303, 85], 'Barcelona': [318, 84], 'Milan': [338, 78],
  'New York': [120, 88], 'Los Angeles': [80, 105], 'Chicago': [110, 82], 'Houston': [100, 110],
  'Miami': [120, 120], 'Toronto': [118, 78], 'Vancouver': [72, 72], 'Mexico City': [100, 130],
  'São Paulo': [158, 248], 'Rio de Janeiro': [162, 245], 'Buenos Aires': [152, 278],
  'Bogotá': [138, 198], 'Lima': [130, 228], 'Santiago': [140, 270],
  'Dubai': [408, 112], 'Abu Dhabi': [405, 115], 'Riyadh': [395, 115],
  'Istanbul': [368, 80], 'Ankara': [372, 78], 'Cairo': [363, 105],
  'Tel Aviv': [368, 97], 'Beirut': [367, 94], 'Amman': [370, 98],
  'Mumbai': [438, 130], 'Delhi': [438, 105], 'Bangalore': [440, 145],
  'Kolkata': [458, 115], 'Chennai': [445, 148],
  'Tokyo': [558, 88], 'Osaka': [552, 92], 'Seoul': [548, 82], 'Beijing': [532, 78],
  'Shanghai': [540, 95], 'Hong Kong': [535, 108], 'Bangkok': [510, 128],
  'Singapore': [518, 148], 'Kuala Lumpur': [514, 143], 'Jakarta': [518, 163],
  'Sydney': [588, 245], 'Melbourne': [578, 255], 'Auckland': [630, 258],
  'Johannesburg': [352, 228], 'Cape Town': [338, 248], 'Nairobi': [375, 185],
  'Lagos': [325, 168], 'Accra': [318, 168], 'Casablanca': [308, 100],
  'Toronto': [118, 78], 'Montreal': [125, 75],
  'Unknown': [350, 170]
};

function getCountryCenter(country) {
  const centers = {
    'United States': [100, 95], 'United Kingdom': [312, 65], 'France': [322, 75],
    'Germany': [340, 65], 'Spain': [313, 86], 'Italy': [345, 88],
    'Australia': [570, 230], 'Canada': [100, 72], 'Brazil': [155, 245],
    'Greece': [358, 90], 'Netherlands': [325, 62], 'Belgium': [322, 67],
    'Portugal': [305, 86], 'Ireland': [305, 63], 'Sweden': [345, 52],
    'Norway': [335, 50], 'Denmark': [335, 58], 'Poland': [355, 65],
    'Austria': [345, 70], 'Switzerland': [332, 76], 'Turkey': [375, 82],
    'Israel': [368, 97], 'Lebanon': [367, 94], 'Jordan': [372, 100],
    'United Arab Emirates': [410, 114], 'Saudi Arabia': [395, 115],
    'India': [445, 125], 'Pakistan': [425, 110], 'Bangladesh': [462, 118],
    'Japan': [558, 90], 'China': [520, 90], 'South Korea': [548, 83],
    'Singapore': [518, 148], 'Malaysia': [514, 143], 'Thailand': [510, 128],
    'Indonesia': [525, 160], 'Philippines': [542, 130],
    'South Africa': [348, 235], 'Nigeria': [328, 168], 'Kenya': [378, 185],
    'Egypt': [363, 105], 'Morocco': [310, 100], 'Ghana': [318, 168],
    'Mexico': [100, 128], 'Argentina': [148, 275], 'Colombia': [138, 198],
    'Peru': [130, 228], 'Chile': [138, 268],
    'New Zealand': [628, 258], 'Unknown': [350, 170]
  };
  return centers[country] || [350, 170];
}

function addPin(x, y, city, isNew) {
  const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
  g.setAttribute('class', 'pin');

  if (isNew) {
    const ring = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    ring.setAttribute('cx', x); ring.setAttribute('cy', y);
    ring.setAttribute('r', '6'); ring.setAttribute('fill', '#17587E');
    ring.setAttribute('opacity', '0.3'); ring.setAttribute('class', 'pin-ring');
    g.appendChild(ring);
  }

  const dot = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
  dot.setAttribute('cx', x); dot.setAttribute('cy', y);
  dot.setAttribute('r', isNew ? '5' : '4');
  dot.setAttribute('fill', '#17587E');
  dot.setAttribute('stroke', '#fff'); dot.setAttribute('stroke-width', '1.5');
  g.appendChild(dot);

  if (city && city !== 'Unknown') {
    const label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    label.setAttribute('x', x + 7); label.setAttribute('y', y + 4);
    label.setAttribute('font-size', '8'); label.setAttribute('fill', '#17587E');
    label.setAttribute('font-family', 'Inter,sans-serif');
    label.textContent = city;
    g.appendChild(label);
  }

  document.getElementById('pinsGroup').appendChild(g);
}

async function loadPins() {
  try {
    const res = await fetch(APPS_SCRIPT_URL + '?type=getLocations');
    const data = await res.json();
    const locations = data.locations || [];

    document.getElementById('recipeCount').textContent = data.totalRecipes || locations.length;
    document.getElementById('countryCount').textContent = data.totalCountries || '—';
    document.getElementById('lastUpdate').textContent = 'Updated just now';

    // Plot pins — deduplicate by city
    const plotted = new Set();
    locations.slice(-60).forEach((item, idx) => {
      const key = item.city || item.country;
      if (!key || plotted.has(key)) return;
      plotted.add(key);

      let coords = cityCoords[item.city] || getCountryCenter(item.country) || [350, 170];
      const ox = (Math.random() - 0.5) * 8;
      const oy = (Math.random() - 0.5) * 8;
      addPin(coords[0] + ox, coords[1] + oy, item.city, idx >= locations.length - 3);
    });

  } catch(e) {
    document.getElementById('lastUpdate').textContent = 'Live data';
  }
}

// Show dish being made
const dish = sessionStorage.getItem('recipeDish') || 'your recipe';
document.getElementById('cookingDish').textContent = '"' + dish + '"';

// Load map pins
loadPins();

// Start recipe generation in background
async function startGeneration() {
  try {
    const dish = sessionStorage.getItem('recipeDish') || '';
    const allergies = (sessionStorage.getItem('recipeAllergies') || 'None').split(', ').filter(a => a !== 'None');
    const firstName = sessionStorage.getItem('customerName') || '';
    const recipeId = sessionStorage.getItem('recipeId') || '';
    const date = sessionStorage.getItem('recipeDate') || '';
    const time = sessionStorage.getItem('recipeTime') || '';

    const prompt = `You are Chef Jessica McKenzie. Create a FULL PROFESSIONAL VEGAN recipe for: ${dish}
Avoid: ${allergies.join(', ') || 'nothing'}

RULES:
- All recipes MUST be 100% vegan
- Use FREE FROM THAT products where relevant: PANACEGG V2 (baked pastry/choux/custards - 5g+45g water = 1 egg), POTATO PROTEIN 300CW (mousse/meringues/marshmallows only - foaming), GERBET (macarons only - 12g+108g cold water per 40 shells)
- NEVER use aquafaba
- Generate 12-15 detailed steps minimum
- Each step must be specific with temperatures, timings, and technique details
- Ingredients list must be complete with ALL items needed (10-15 ingredients minimum)
- Use metric measurements (grams, ml)

RESPOND ONLY WITH THIS EXACT JSON (no markdown, no extra text):
{
  "title": "Recipe Name",
  "tagline": "One line describing the dish and technique",
  "why": "One sentence: why this vegan technique works scientifically",
  "about": "One sentence: about this dish",
  "technique": "Key technique name",
  "servings": "e.g. Makes 40 shells / Serves 6",
  "ingredients": [
    {"name": "Ingredient name", "qty": "250g"}
  ],
  "steps": ["Step 1...", "Step 2...", "...at least 12 steps..."],
  "whyItWorks": "2-3 sentences explaining the food science",
  "fftProduct": "PANACEGG V2 or POTATO PROTEIN 300CW or GERBET",
  "tip": "One specific professional chef tip"
}`;

    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), 28000);

    const response = await fetch(WORKER_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt }),
      signal: controller.signal
    });
    clearTimeout(timeout);

    if (!response.ok) throw new Error('Worker error');

    const text = await response.text();
    const jsonMatch = text.match(/\{[\s\S]*\}/);
    if (!jsonMatch) throw new Error('No JSON');

    const recipe = JSON.parse(jsonMatch[0]);
    recipe.customerName = firstName;

    // Save recipe to sheet
    fetch(WORKER_URL + '/sheet', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        type: 'recipe',
        recipeId, date, time,
        recipeName: recipe.title || dish,
        cuisine: 'Vegan', mealType: 'Baking/Pastry',
        allergies: allergies.join(', ') || 'None',
        diet: 'Vegan', fftProducts: recipe.fftProduct || ''
      })
    }).catch(() => {});

    sessionStorage.setItem('recipeData', JSON.stringify(recipe));
    window.location.href = 'page-2.html';

  } catch(err) {
    // On error go back to index
    sessionStorage.setItem('mapError', err.message);
    window.location.href = 'index.html';
  }
}

startGeneration();
</script>
</body>
</html>
