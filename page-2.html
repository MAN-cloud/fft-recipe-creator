<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Recipe</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Lora',serif;background:#f5f5f5;color:#333;line-height:1.5}
.wrapper{max-width:900px;margin:0 auto;padding:20px}
.recipe-container{background:#fff;padding:40px}
.header-section{margin-bottom:30px;border-bottom:2px solid #333;padding-bottom:20px}
.recipe-title{font-size:32px;font-weight:600;color:#000;margin-bottom:5px;text-align:center}
.recipe-meta{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin:20px 0;font-size:13px}
.meta-item{line-height:1.6}
.meta-label{font-weight:600;text-transform:uppercase;font-size:11px;letter-spacing:0.5px;color:#666;margin-bottom:3px}
.ingredient-box{background:#f9f9f9;border:1px solid #ddd;border-radius:4px;padding:15px;margin-bottom:20px}
.ingredient-title{font-weight:600;text-transform:uppercase;font-size:12px;color:#000;margin-bottom:5px}
.ingredient-text{font-size:13px;line-height:1.6;color:#333}
table{width:100%;border-collapse:collapse;margin:20px 0}
th{background:#f0f0f0;padding:12px;border:1px solid #ddd;font-weight:600;font-size:12px;text-align:left;text-transform:uppercase;letter-spacing:0.5px}
td{padding:12px;border:1px solid #ddd;font-size:13px;line-height:1.6;vertical-align:top}
.section-title{font-weight:600;text-transform:uppercase;font-size:12px;letter-spacing:0.5px;color:#000;margin-top:25px;margin-bottom:10px;border-bottom:1px solid #ddd;padding-bottom:5px}
.buttons{display:grid;grid-template-columns:1fr 1fr;gap:15px;margin-top:30px}
.btn{padding:12px 20px;border:none;border-radius:4px;font-weight:600;cursor:pointer;font-size:14px;text-decoration:none;text-align:center}
.btn-primary{background:#1565C0;color:#fff}
.btn-secondary{background:#fff;color:#1565C0;border:2px solid #1565C0}
.back-link{display:block;margin-top:20px;text-align:center;color:#1565C0;text-decoration:none;font-weight:600;font-size:13px}
@media(max-width:768px){
  .recipe-meta{grid-template-columns:1fr}
  .buttons{grid-template-columns:1fr}
}
@media print{
  body{background:#fff}
  .buttons{display:none}
  .back-link{display:none}
}
</style>
</head>
<body>
<div class="wrapper">
  <div class="recipe-container" id="recipePDF">
    <!-- Header -->
    <div class="header-section">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:15px">
        <div style="font-weight:600;font-size:13px">RECIPE BY: Chef Jessica McKenzie</div>
        <img src="https://raw.githubusercontent.com/MAN-cloud/fft-recipe-creator/main/FFT%20LOGO%20NEW%202026.jpg" alt="FFT" style="height:50px;width:auto">
      </div>
      <h1 class="recipe-title" id="recipeTitle">Recipe Name</h1>
      <p style="text-align:center;font-style:italic;font-size:14px;color:#666;margin-top:10px" id="recipeTagline">Description</p>
    </div>

    <!-- Recipe Info -->
    <div class="recipe-meta">
      <div class="meta-item">
        <div class="meta-label">WHY</div>
        <div class="ingredient-text" id="recipeWhy">Technique type</div>
      </div>
      <div class="meta-item">
        <div class="meta-label">ABOUT</div>
        <div class="ingredient-text" id="recipeAbout">Recipe description</div>
      </div>
      <div class="meta-item">
        <div class="meta-label">TECHNIQUE</div>
        <div class="ingredient-text" id="recipeTechnique">Texture/Flavor</div>
      </div>
      <div class="meta-item">
        <div class="meta-label">MAKES</div>
        <div class="ingredient-text" id="recipeMakes">Servings</div>
      </div>
    </div>

    <!-- Special Ingredient -->
    <div class="ingredient-box" id="specialIngredient" style="display:none">
      <div class="ingredient-title">SPECIAL INGREDIENT</div>
      <div class="ingredient-text" id="specialIngredientName">FFT Product</div>
    </div>

    <!-- Ingredients & Method Table -->
    <h2 class="section-title">RECIPE</h2>
    <table>
      <thead>
        <tr>
          <th style="width:25%">INGREDIENT</th>
          <th style="width:15%">QTY</th>
          <th style="width:60%">METHOD</th>
        </tr>
      </thead>
      <tbody id="recipeTable">
        <tr>
          <td colspan="3" style="text-align:center;color:#999">Recipe will appear here</td>
        </tr>
      </tbody>
    </table>

    <!-- Why It Works -->
    <div id="whySection"></div>

    <!-- Chef Tip -->
    <div id="tipSection"></div>

  </div>

  <div class="buttons">
    <button class="btn btn-primary" onclick="downloadPDF()">📥 Download PDF</button>
    <button class="btn btn-secondary" onclick="window.location.href='page-3.html'">Sign Up / Login →</button>
  </div>

  <a href="index.html" class="back-link">← Make Another Recipe</a>
</div>

<script>
const recipe = JSON.parse(sessionStorage.getItem('recipeData') || '{}');

if (!recipe.title) {
  document.body.innerHTML = '<div style="padding:40px;text-align:center;font-size:18px"><h2>No recipe found</h2><p>Please create a recipe first</p><a href="index.html" style="color:#1565C0;text-decoration:none;font-weight:600">← Go back to recipe maker</a></div>';
} else {
  // Header
  document.getElementById('recipeTitle').textContent = recipe.title;
  document.getElementById('recipeTagline').textContent = recipe.tagline;
  
  // Recipe Info
  document.getElementById('recipeWhy').textContent = recipe.why || 'Vegan Technique';
  document.getElementById('recipeAbout').textContent = recipe.about || recipe.tagline;
  document.getElementById('recipeTechnique').textContent = recipe.technique || 'Flavor/Texture';
  document.getElementById('recipeMakes').textContent = recipe.servings || 'Multiple servings';
  
  // Special Ingredient
  if (recipe.fftProduct) {
    document.getElementById('specialIngredient').style.display = 'block';
    document.getElementById('specialIngredientName').textContent = `PANACEGG V2 - ${recipe.fftProduct}`;
  }
  
  // Build Table
  const table = document.getElementById('recipeTable');
  table.innerHTML = '';
  
  if (Array.isArray(recipe.ingredients) && recipe.ingredients.length > 0) {
    recipe.ingredients.forEach((ing, idx) => {
      const row = document.createElement('tr');
      row.innerHTML = `
        <td>${ing.split(' ').slice(0, 3).join(' ')}</td>
        <td>${ing.split('[')[1]?.split(']')[0] || 'qty'}</td>
        <td>${idx < (recipe.steps || []).length ? recipe.steps[idx] : ''}</td>
      `;
      table.appendChild(row);
    });
  }
  
  // Why It Works
  if (recipe.whyItWorks) {
    document.getElementById('whySection').innerHTML = `
      <h2 class="section-title">WHY IT WORKS</h2>
      <p style="font-size:13px;line-height:1.7;color:#333">${recipe.whyItWorks}</p>
    `;
  }
  
  // Chef Tip
  if (recipe.tip) {
    document.getElementById('tipSection').innerHTML = `
      <h2 class="section-title">CHEF TIP</h2>
      <p style="font-size:13px;line-height:1.7;color:#333">${recipe.tip}</p>
    `;
  }
}

function downloadPDF() {
  const element = document.getElementById('recipePDF');
  const opt = {
    margin: 15,
    filename: `${recipe.title || 'recipe'}.pdf`,
    image: { type: 'jpeg', quality: 0.98 },
    html2canvas: { scale: 2, letterRendering: true },
    jsPDF: { orientation: 'portrait', unit: 'mm', format: 'a4' }
  };
  html2pdf().set(opt).from(element).save();
}
</script>
</body>
</html>
