<div id="scene-1" class="screen active">
    <div class="wrap">
        <div class="hero"><h1>Chef Jessica's <br><em>Recipe Creator</em></h1></div>
        <input type="text" id="user-name" placeholder="Full Name">
        <input type="tel" id="user-phone" placeholder="Phone Number">
        <button id="main-btn" onclick="toScene2()">Continue to Recipe →</button>
        <div id="ip-display">Connecting to Secure Server...</div>
    </div>
</div>

<div id="scene-2" class="screen below">
    <div class="wrap">
        <textarea id="user-input" rows="4" placeholder="What would you like to bake today?"></textarea>
        <h3>Allergies & Intolerances</h3>
        <div class="tag-group">
            <div class="tag">Gluten</div><div class="tag">Nuts</div><div class="tag">Dairy</div><div class="tag">Eggs</div><div class="tag">Soy</div>
        </div>
        <h3>Dietary Preferences</h3>
        <div class="tag-group">
            <div class="tag">Vegan</div><div class="tag">Vegetarian</div><div class="tag">Halal</div><div class="tag">Kosher</div><div class="tag">Gluten-free</div>
        </div>
        <div id="response"></div>
        <button id="main-btn" onclick="runAI()">✨ Make My Recipe</button>
    </div>
</div>

<script>
    const API_URL = 'https://fft-recipe.man-4bb.workers.dev/chat';
    let lead = { name: '', phone: '', ip: '' };

    // IMPROVED IP & LOCATION FETCH
    async function getVisitorInfo() {
        try {
            const response = await fetch('https://ipinfo.io/json?token=7ba063168a29b5'); // Using a public token method
            const data = await response.json();
            lead.ip = `${data.ip} - ${data.city}, ${data.region}, ${data.country}`;
            document.getElementById('ip-display').innerText = `ACCESS ID: ${lead.ip}`;
        } catch (e) {
            // Fallback 1
            fetch('https://api.db-ip.com/v2/free/self')
            .then(r => r.json())
            .then(d => {
                lead.ip = `${d.ipAddress} - ${d.city}, ${d.countryName}`;
                document.getElementById('ip-display').innerText = `ACCESS ID: ${lead.ip}`;
            })
            .catch(() => {
                document.getElementById('ip-display').innerText = "Secure Connection Active";
            });
        }
    }
    getVisitorInfo();

    document.querySelectorAll('.tag').forEach(t => t.onclick = () => t.classList.toggle('active'));

    function toScene2() {
        lead.name = document.getElementById('user-name').value;
        lead.phone = document.getElementById('user-phone').value;
        if(!lead.name || !lead.phone) return alert("Required: Name & Phone");
        document.getElementById('scene-1').classList.remove('active');
        document.getElementById('scene-2').classList.add('active');
    }

    async function runAI() {
        const msg = document.getElementById('user-input').value;
        const tags = Array.from(document.querySelectorAll('.tag.active')).map(t => t.innerText);
        const box = document.getElementById('response');
        box.style.display = 'block';
        box.innerText = "Consulting Chef Jessica's logic...";

        try {
            const r = await fetch(API_URL, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ message: msg, lead: lead, tags: tags })
            });
            const d = await r.json();
            box.innerHTML = d.response;
        } catch (e) { box.innerText = "Connection error."; }
    }
</script>
