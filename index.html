<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chef Jessica's Panacea Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary-pink: #FF1493; --soft-pink: #FFF0F5; --bg: #FAF8F4; --text: #1A1A18; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); padding: 15px; }
        .wrap { max-width: 580px; margin: 0 auto; background: white; padding: 2rem; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .scene { display: none; }
        .scene.active { display: block; }
        h1 { font-family: 'Lora', serif; color: var(--primary-pink); margin-bottom: 1rem; text-align: center; }
        input, textarea { width: 100%; padding: 15px; border: 1px solid #ddd; border-radius: 12px; font-size: 1rem; margin-bottom: 1rem; }
        h3 { font-size: 0.75rem; text-transform: uppercase; letter-spacing: .05em; color: #888; margin: 1.5rem 0 0.75rem; }
        .tag-group { display: flex; flex-wrap: wrap; gap: 8px; }
        .tag { padding: 8px 16px; border: 1px solid #ddd; border-radius: 20px; background: white; font-size: 0.85rem; cursor: pointer; }
        .tag.active { background: var(--primary-pink); color: white; border-color: var(--primary-pink); }
        button { background: var(--primary-pink); color: white; border: none; width: 100%; padding: 18px; border-radius: 30px; font-size: 1.1rem; font-weight: 600; cursor: pointer; margin-top: 20px; }
        #response { margin-top: 20px; padding: 20px; background: var(--soft-pink); border-radius: 12px; display: none; line-height: 1.6; border-left: 5px solid var(--primary-pink); }
    </style>
</head>
<body>
    <div class="wrap">
        <div id="scene-1" class="scene active">
            <h1>Welcome to the Panacea</h1>
            <p style="text-align:center; margin-bottom:20px;">Let's get started with your details.</p>
            <input type="text" id="user-name" placeholder="Full Name" required>
            <input type="tel" id="user-phone" placeholder="Phone Number" required>
            <button onclick="goToScene2()">Next Step →</button>
        </div>

        <div id="scene-2" class="scene">
            <h1>Recipe Choices</h1>
            <textarea id="user-input" rows="3" placeholder="What would you like to bake?"></textarea>
            
            <h3>Allergies</h3>
            <div class="tag-group">
                <div class="tag">Gluten</div><div class="tag">Nuts</div><div class="tag">Dairy</div><div class="tag">Eggs</div><div class="tag">Soy</div>
            </div>

            <h3>Dietary</h3>
            <div class="tag-group">
                <div class="tag">Vegan</div><div class="tag">Halal</div><div class="tag">Kosher</div><div class="tag">Keto</div>
            </div>

            <div id="response"></div>
            <button id="make-recipe">✨ Make My Recipe</button>
        </div>
    </div>

    <script>
        const API_URL = 'https://fft-recipe.man-4bb.workers.dev/chat';
        let userData = { name: '', phone: '', ip: '' };

        // Auto-capture IP Address
        fetch('https://api.ipify.org?format=json')
            .then(res => res.json())
            .then(data => userData.ip = data.ip);

        function goToScene2() {
            userData.name = document.getElementById('user-name').value;
            userData.phone = document.getElementById('user-phone').value;
            if(!userData.name || !userData.phone) return alert("Please fill in your details.");
            document.getElementById('scene-1').classList.remove('active');
            document.getElementById('scene-2').classList.add('active');
        }

        document.querySelectorAll('.tag').forEach(tag => {
            tag.addEventListener('click', () => tag.classList.toggle('active'));
        });

        document.getElementById('make-recipe').addEventListener('click', async () => {
            const input = document.getElementById('user-input').value;
            const activeTags = Array.from(document.querySelectorAll('.tag.active')).map(t => t.innerText);
            const responseDiv = document.getElementById('response');
            
            responseDiv.style.display = 'block';
            responseDiv.innerText = "Chef Jessica is crafting your recipe...";

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        message: input,
                        user: userData,
                        preferences: activeTags
                    })
                });
                const data = await response.json();
                responseDiv.innerText = data.response;
            } catch (error) {
                responseDiv.innerText = "Error connecting to the Panacea Engine.";
            }
        });
    </script>
</body>
</html>
