<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Free From That — Recipe Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Georgia', serif; background: #0d1117; color: #fff; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

    #header { display: flex; align-items: center; gap: 14px; padding: 14px 20px; background: #ffffff; border-bottom: 1px solid #e0e0e0; z-index: 1000; flex-shrink: 0; }
    #header img { width: 52px; height: 52px; border-radius: 50%; object-fit: cover; background: #fff; }
    #header-text h1 { font-size: 1rem; font-weight: 700; letter-spacing: 0.08em; color: #17587E; text-transform: uppercase; }
    #header-text p { font-size: 0.72rem; color: #666; font-style: italic; margin-top: 1px; }

    #context-banner { background: #17587E; color: #ffffff; text-align: center; padding: 16px 24px; font-size: 2.5rem; font-family: 'Georgia', serif; font-style: italic; line-height: 1.3; flex-shrink: 0; }

    #map { flex: 1; width: 100%; }

    #loading-overlay { position: absolute; inset: 0; background: #0d1117; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 2000; gap: 16px; transition: opacity 0.5s ease; }
    #loading-overlay.hidden { opacity: 0; pointer-events: none; }
    .loading-star { font-size: 2.5rem; animation: spin 1.8s linear infinite; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    #loading-overlay p { color: #7a9ab0; font-size: 0.9rem; letter-spacing: 0.05em; }

    #continue-btn { position: absolute; bottom: 28px; left: 50%; transform: translateX(-50%); z-index: 1500; background: #17587E; color: #fff; border: none; padding: 14px 36px; border-radius: 50px; font-size: 1rem; font-family: 'Georgia', serif; letter-spacing: 0.05em; cursor: pointer; box-shadow: 0 4px 24px rgba(23,88,126,0.5); transition: background 0.2s, transform 0.1s; display: none; }
    #continue-btn:hover { background: #1a6fa0; transform: translateX(-50%) scale(1.03); }

    .leaflet-popup-content-wrapper { background: #0f1e2a !important; color: #f5c842 !important; border: 1px solid #f5c842 !important; border-radius: 10px !important; box-shadow: 0 0 16px rgba(245,200,66,0.35) !important; font-family: 'Georgia', serif !important; }
    .leaflet-popup-tip { background: #f5c842 !important; }
    .leaflet-popup-content { font-size: 0.88rem !important; font-style: italic !important; margin: 8px 14px !important; color: #f5c842 !important; }
    .leaflet-popup-close-button { color: #f5c842 !important; }

    #pin-count { position: absolute; top: 76px; right: 16px; z-index: 1000; background: rgba(13,17,23,0.85); border: 1px solid #1e2a35; border-radius: 20px; padding: 6px 14px; font-size: 0.75rem; color: #7a9ab0; display: none; }
    #pin-count span { color: #f5c842; font-weight: bold; }
  </style>
</head>
<body>

  <div id="header">
    <img src="https://cdn.jsdelivr.net/gh/MAN-cloud/fft-recipe-creator@main/FFT_NEW_LOGO_TRANSPARENT.png"
         onerror="this.src='https://lh3.googleusercontent.com/d/1-U0QpuzEn9x5gDX2WtHSMfns4v3mp5bj=s200'"
         alt="FFT Logo" />
    <div id="header-text">
      <h1>✨ My Recipe Maker</h1>
      <p>Recipes cooking around the world</p>
    </div>
  </div>

  <div id="context-banner">
    Chefs worldwide have made recipes with Free From That
  </div>

  <div id="map"></div>

  <div id="pin-count">Showing <span id="count-num">0</span> recipes worldwide</div>

  <div id="loading-overlay">
    <div class="loading-star">🌟</div>
    <p>Mapping recipes around the world…</p>
  </div>

  <button id="continue-btn" onclick="goNext()">View Your Recipe →</button>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxiBmw7MH9--VlC3VDcwmPuRP27KPzGKETt3uIqOr0qMe1OuBo9CY6Z4A8hEXsr3IQT4A/exec';
    const WORKER_URL      = 'https://fft-recipe.man-4bb.workers.dev';

    let recipeReady = false;
    let btnClicked  = false;

    const map = L.map('map', { zoomControl: true, attributionControl: true, scrollWheelZoom: true });

    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
      attribution: '&copy; <a href="https://carto.com/">CARTO</a>',
      subdomains: 'abcd', maxZoom: 19
    }).addTo(map);

    const yellowPin = L.divIcon({
      className: '',
      html: `<div style="width:18px;height:18px;background:#f5c842;border-radius:50%;border:3px solid #fff5cc;cursor:pointer;box-shadow:0 0 8px 3px rgba(245,200,66,0.85),0 0 20px 6px rgba(245,200,66,0.4);"></div>`,
      iconSize: [18,18], iconAnchor: [9,9], popupAnchor: [0,-14]
    });

    async function loadPins() {
      try {
        const res  = await fetch(`${APPS_SCRIPT_URL}?action=getCustomers&t=${Date.now()}`);
        const data = await res.json();
        const customers = Array.isArray(data) ? data : (data.customers || data.data || []);
        const valid = customers.filter(c => c.lat && c.lng && !isNaN(parseFloat(c.lat)));
        if (valid.length === 0) { placeDemoPins(); return; }
        const bounds = [];
        valid.forEach(c => {
          const lat = parseFloat(c.lat), lng = parseFloat(c.lng);
          const dish = c.dish || c.recipe || c.dishName || '✨ Vegan Recipe';
          L.marker([lat,lng], {icon:yellowPin}).addTo(map).bindPopup(`<strong>${dish}</strong>`);
          bounds.push([lat,lng]);
        });
        map.fitBounds(bounds, { padding:[60,60], maxZoom:10 });
        showPinCount(valid.length);
      } catch(err) {
        placeDemoPins();
      } finally {
        hideLoading();
      }
    }

    function placeDemoPins() {
      const demos = [
        {lat:43.53573,lng:-5.66152,dish:'✨ Vegan Eclairs'},
        {lat:51.5074, lng:-0.1278, dish:'🍰 Vegan Cheesecake'},
        {lat:48.8566, lng:2.3522,  dish:'🎀 Macarons'},
        {lat:40.4168, lng:-3.7038, dish:'☁️ Chocolate Mousse'},
        {lat:52.3676, lng:4.9041,  dish:'✨ Choux Pastry'},
        {lat:41.9028, lng:12.4964, dish:'🍰 Tiramisu Vegan'},
        {lat:37.9838, lng:23.7275, dish:'✨ Baklava Vegan'},
        {lat:40.7128, lng:-74.006, dish:'🎀 Macarons NYC'},
        {lat:-33.8688,lng:151.2093,dish:'☁️ Pavlova Vegan'},
        {lat:35.6762, lng:139.6503,dish:'✨ Mochi Vegan'},
      ];
      const bounds = [];
      demos.forEach(d => {
        L.marker([d.lat,d.lng], {icon:yellowPin}).addTo(map).bindPopup(`<strong>${d.dish}</strong>`);
        bounds.push([d.lat,d.lng]);
      });
      map.fitBounds(bounds, {padding:[60,60], maxZoom:5});
      showPinCount(demos.length);
    }

    function showPinCount(n) {
      document.getElementById('count-num').textContent = n;
      document.getElementById('pin-count').style.display = 'block';
    }

    function hideLoading() {
      const overlay = document.getElementById('loading-overlay');
      overlay.classList.add('hidden');
      setTimeout(() => overlay.remove(), 600);
      setTimeout(() => { document.getElementById('continue-btn').style.display = 'block'; }, 800);
    }

    function goNext() {
      if (recipeReady) {
        window.location.href = 'page-2.html';
      } else {
        btnClicked = true;
        const btn = document.getElementById('continue-btn');
        btn.textContent = '⏳ Chef is still cooking…';
        btn.disabled = true;
        btn.style.opacity = '0.7';
      }
    }

    async function generateRecipe() {
      const dish      = sessionStorage.getItem('recipeDish')      || '';
      const allergies = sessionStorage.getItem('recipeAllergies') || 'None';
      const firstName = sessionStorage.getItem('customerName')    || '';
      const recipeId  = sessionStorage.getItem('recipeId')        || '';
      const date      = sessionStorage.getItem('recipeDate')      || '';
      const time      = sessionStorage.getItem('recipeTime')      || '';

      if (!dish) { recipeReady = true; if (btnClicked) window.location.href = 'page-2.html'; return; }

      const prompt = `You are Chef Jessica McKenzie. Create a FULL PROFESSIONAL VEGAN recipe for: ${dish}
Avoid: ${allergies}

RULES:
- All recipes MUST be 100% vegan
- Use FREE FROM THAT products where relevant: PANACEGG V2 (baked pastry/choux/custards - 5g+45g water = 1 egg), POTATO PROTEIN 300CW (mousse/meringues/marshmallows only - foaming), GERBET (macarons only - 12g+108g cold water per 40 shells)
- NEVER use aquafaba
- Generate 12-15 detailed steps minimum
- Each step must be specific with temperatures, timings, and technique details
- Ingredients list must be complete with ALL items needed (10-15 ingredients minimum)
- Use metric measurements (grams, ml)

RESPOND ONLY WITH THIS EXACT JSON (no markdown, no extra text):
{
  "title": "Recipe Name",
  "tagline": "One line describing the dish and technique",
  "why": "One sentence: why this vegan technique works scientifically",
  "about": "One sentence: about this dish",
  "technique": "Key technique name",
  "servings": "e.g. Makes 40 shells / Serves 6",
  "ingredients": [{"name": "Ingredient name", "qty": "250g"}],
  "steps": ["Step 1: ...", "Step 2: ..."],
  "whyItWorks": "2-3 sentences explaining the food science",
  "fftProduct": "PANACEGG V2 or POTATO PROTEIN 300CW or GERBET",
  "tip": "One specific professional chef tip"
}`;

      try {
        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), 25000);
        const response = await fetch(WORKER_URL, {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({prompt}),
          signal: controller.signal
        });
        clearTimeout(timeout);
        if (!response.ok) throw new Error('Worker error: ' + response.status);
        const text = await response.text();
        const jsonMatch = text.match(/\{[\s\S]*\}/);
        if (!jsonMatch) throw new Error('No JSON in response');
        const recipe = JSON.parse(jsonMatch[0]);
        recipe.customerName = firstName;
        fetch(WORKER_URL + '/sheet', {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({type:'recipe', recipeId, date, time, recipeName: recipe.title||dish, cuisine:'Vegan', mealType:'Baking/Pastry', allergies, diet:'Vegan', fftProducts: recipe.fftProduct||''})
        }).catch(()=>{});
        sessionStorage.setItem('recipeData', JSON.stringify(recipe));
      } catch(err) {
        console.error('Recipe generation error:', err);
        sessionStorage.setItem('recipeError', '1');
      }

      recipeReady = true;
      if (btnClicked) window.location.href = 'page-2.html';
    }

    setTimeout(loadPins, 400);
    generateRecipe();
  </script>
</body>
</html>
