<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Sign Up / Login</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#FAF8F4;color:#1A1A18;font-size:16px}
.wrap{max-width:500px;margin:0 auto;padding:20px}
.hero{background:#1565C0;border-radius:14px;padding:30px;margin-bottom:30px;text-align:center;color:#fff}
.hero h1{font-size:24px;margin-bottom:10px}
.tabs{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.tab-btn{padding:12px;border:2px solid #1565C0;background:#fff;color:#1565C0;border-radius:8px;font-weight:600;cursor:pointer;transition:all 0.2s}
.tab-btn.active{background:#1565C0;color:#fff}
.form-group{margin-bottom:15px}
.label{font-size:12px;font-weight:600;color:#888;text-transform:uppercase;margin-bottom:8px;display:block}
input{width:100%;padding:12px;border:1px solid #ddd;border-radius:8px;font-size:14px}
input:focus{outline:none;border-color:#1565C0;background:#f9f9f9}
.btn{width:100%;padding:12px;background:#1565C0;color:#fff;border:none;border-radius:8px;font-weight:600;cursor:pointer;font-size:16px;margin-bottom:10px}
.btn:hover{background:#0D47A1}
.hidden{display:none}
.form-container{background:#fff;border-radius:14px;padding:20px;border:1px solid #ddd}
.signup-link{text-align:center;font-size:14px;color:#777;margin-top:15px}
.signup-link a{color:#1565C0;text-decoration:none;font-weight:600}
</style>
</head>
<body>
<div class="wrap">
  <div class="hero">
    <h1>Welcome Back!</h1>
    <p>Create an account or log in to download your recipe</p>
  </div>

  <div class="tabs">
    <button class="tab-btn active" onclick="showTab('login')">Login</button>
    <button class="tab-btn" onclick="showTab('signup')">Sign Up</button>
  </div>

  <div class="form-container">
    <form id="loginForm" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label class="label">Email</label>
        <input type="email" placeholder="your@email.com" required>
      </div>
      <div class="form-group">
        <label class="label">Password</label>
        <input type="password" placeholder="Enter password" required>
      </div>
      <button type="submit" class="btn">Login</button>
      <div class="signup-link">Don't have an account? <a href="#" onclick="showTab('signup');return false">Sign Up</a></div>
    </form>

    <form id="signupForm" class="hidden" onsubmit="handleSignup(event)">
      <div class="form-group">
        <label class="label">Full Name</label>
        <input type="text" placeholder="Your name" required>
      </div>
      <div class="form-group">
        <label class="label">Email</label>
        <input type="email" placeholder="your@email.com" required>
      </div>
      <div class="form-group">
        <label class="label">Password</label>
        <input type="password" placeholder="Create password" required>
      </div>
      <div class="form-group">
        <label class="label">Country</label>
        <select style="width:100%;padding:12px;border:1px solid #ddd;border-radius:8px" required>
          <option value="">Select country</option>
          <option value="USA">United States</option>
          <option value="UK">United Kingdom</option>
          <option value="Canada">Canada</option>
          <option value="Australia">Australia</option>
          <option value="Spain">Spain</option>
        </select>
      </div>
      <button type="submit" class="btn">Create Account</button>
      <div class="signup-link">Already have an account? <a href="#" onclick="showTab('login');return false">Login</a></div>
    </form>
  </div>

  <button class="btn" style="background:#fff;color:#1565C0;border:2px solid #1565C0;margin-top:20px" onclick="window.location.href='page-2.html'">← Back to Recipe</button>
</div>

<script>
function showTab(tab) {
  document.getElementById('loginForm').classList.toggle('hidden', tab !== 'login');
  document.getElementById('signupForm').classList.toggle('hidden', tab !== 'signup');
  document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
  event.target.classList.add('active');
}

function handleLogin(e) {
  e.preventDefault();
  // In production, validate credentials here
  window.location.href = 'page-4.html';
}

function handleSignup(e) {
  e.preventDefault();
  // In production, create account here
  window.location.href = 'page-4.html';
}
</script>
</body>
</html>
