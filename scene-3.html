<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Training Courses</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial;background:#FAF8F4;color:#1A1A18}
.wrap{max-width:700px;margin:0 auto;padding:20px}
.hero{background:#1565C0;border-radius:14px;padding:20px;text-align:center;color:#fff;margin-bottom:20px}
.hero h1{font-size:18px;margin:0}
.title{font-size:24px;font-weight:600;text-align:center;margin-bottom:20px}
.courses{display:grid;grid-template-columns:1fr 1fr;gap:15px;margin-bottom:20px}
.course{background:#fff;border:1px solid #ddd;border-radius:8px;padding:15px;text-align:center;text-decoration:none;color:inherit;cursor:pointer}
.course:hover{border-color:#1565C0;background:#f0f5ff}
.course-icon{font-size:36px;margin-bottom:10px}
.course-name{font-weight:600;color:#1565C0;font-size:14px}
.btn{width:100%;padding:12px;background:#1565C0;color:#fff;border:none;border-radius:8px;font-weight:600;cursor:pointer;margin-bottom:10px}
.btn:hover{background:#0D47A1}
.btn-secondary{background:#fff;color:#1565C0;border:2px solid #1565C0}
</style>
</head>
<body>
<div class="wrap">
  <div class="hero">
    <h1>Master Your Skills</h1>
  </div>
  <h2 class="title">Recommended Courses</h2>
  <div class="courses">
    <a href="https://www.freefromthat.com/TRAINING-CHEESECAKES" class="course"><div class="course-icon">🍰</div><div class="course-name">Vegan Cheesecakes</div></a>
    <a href="https://www.freefromthat.com/TRAINING-MOUSSE/" class="course"><div class="course-icon">☁️</div><div class="course-name">Mousse Cakes</div></a>
    <a href="https://www.freefromthat.com/TRAINING-BRIOCHE/" class="course"><div class="course-icon">🥐</div><div class="course-name">Brioche</div></a>
    <a href="https://www.freefromthat.com/TRAINING-CUISINE" class="course"><div class="course-icon">🍽️</div><div class="course-name">Vegan Cuisine</div></a>
    <a href="https://www.freefromthat.com/TRAINING-SAVORY" class="course"><div class="course-icon">🥘</div><div class="course-name">Savory Pastry</div></a>
    <a href="https://www.freefromthat.com/TRAINING-BURGERS" class="course"><div class="course-icon">🍔</div><div class="course-name">Vegan Burgers</div></a>
  </div>
  <button class="btn" onclick="window.location.href='scene-4.html'">Save Your Details →</button>
  <button class="btn btn-secondary" onclick="window.location.href='index.html'">← Back to Recipe</button>
</div>

</html>
