<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chef Jessica's Panacea Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-pink: #FF1493;
            --soft-pink: #FFF0F5;
            --deep-black: #1A1A18;
            --cream: #FAF8F4;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--cream);
            color: var(--deep-black);
            padding: 10px;
            line-height: 1.5;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        .header {
            background: var(--primary-pink);
            color: white;
            padding: 30px 20px;
            text-align: center;
        }

        .header h1 { font-family: 'Lora', serif; font-size: 1.8rem; margin-bottom: 5px; }
        .header p { font-size: 0.9rem; opacity: 0.9; font-weight: 300; }

        .chat-area {
            padding: 20px;
            min-height: 300px;
        }

        .input-group {
            padding: 20px;
            background: white;
            border-top: 1px solid #eee;
        }

        textarea {
            width: 100%;
            border: 2px solid #f0f0f0;
            border-radius: 12px;
            padding: 15px;
            font-family: inherit;
            font-size: 1rem;
            resize: none;
            margin-bottom: 10px;
            transition: border-color 0.3s;
        }

        textarea:focus { outline: none; border-color: var(--primary-pink); }

        button {
            background: var(--primary-pink);
            color: white;
            border: none;
            width: 100%;
            padding: 16px;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: transform 0.2s;
        }

        button:active { transform: scale(0.98); }

        .response-box {
            background: var(--soft-pink);
            padding: 20px;
            border-radius: 12px;
            margin-top: 20px;
            display: none;
            border-left: 4px solid var(--primary-pink);
        }

        .loading-spinner {
            display: none;
            margin: 20px auto;
            width: 30px;
            height: 30px;
            border: 3px solid rgba(255,20,147,.3);
            border-radius: 50%;
            border-top-color: var(--primary-pink);
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Panacea Engine</h1>
        <p>Ladurée & Avebe Validated Logic</p>
    </div>

    <div class="chat-area">
        <div id="loading" class="loading-spinner"></div>
        <div id="response" class="response-box"></div>
    </div>

    <div class="input-group">
        <textarea id="user-input" rows="3" placeholder="Describe your recipe or ask about Panacegg..."></textarea>
        <button id="submit-btn">✨ Generate Recipe Logic</button>
    </div>
</div>

<script>
    const API_URL = 'https://fft-recipe.man-4bb.workers.dev/chat';

    const submitBtn = document.getElementById('submit-btn');
    const userInput = document.getElementById('user-input');
    const responseBox = document.getElementById('response');
    const loading = document.getElementById('loading');

    submitBtn.addEventListener('click', async () => {
        const text = userInput.value.trim();
        if (!text) return;

        // Reset UI
        responseBox.style.display = 'none';
        loading.style.display = 'block';
        submitBtn.disabled = true;

        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: text })
            });

            const data = await response.json();
            
            loading.style.display = 'none';
            responseBox.style.display = 'block';
            responseBox.innerHTML = `<strong>Chef Jessica's Guidance:</strong><br><br>${data.response}`;
        } catch (error) {
            loading.style.display = 'none';
            responseBox.style.display = 'block';
            responseBox.innerText = "Connection lost. Please check your internet or try again.";
        } finally {
            submitBtn.disabled = false;
        }
    });
</script>

</body>
</html>
