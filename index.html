<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>AI Kitchen Laboratory - Recipe Maker</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#FAF8F4;color:#1A1A18;font-size:16px}
.wrap{max-width:700px;margin:0 auto;padding:20px}
.hero{background:#1565C0;border-radius:14px;padding:20px;margin-bottom:20px;text-align:center;color:#fff}
.hero h1{font-size:20px;margin:0}
.form-group{margin-bottom:15px}
.label{font-size:12px;font-weight:600;color:#888;text-transform:uppercase;margin-bottom:8px;display:block}
textarea,input,select{width:100%;padding:12px;border:1px solid #ddd;border-radius:8px;font-size:14px;font-family:Arial}
textarea{min-height:100px}
.chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:15px}
.chip{padding:8px 15px;border:1px solid #ddd;border-radius:20px;background:#fff;cursor:pointer;font-size:13px}
.chip:hover{border-color:#1565C0}
.chip.selected{background:#1565C0;color:#fff;border-color:#1565C0}
.btn{width:100%;padding:12px;background:#1565C0;color:#fff;border:none;border-radius:8px;font-weight:600;cursor:pointer;font-size:16px;margin-bottom:10px}
.btn:hover{background:#0D47A1}
.btn:disabled{opacity:.6;cursor:not-allowed}
.btn-secondary{background:#fff;color:#1565C0;border:2px solid #1565C0}
.recipe-card{background:#fff;border-radius:14px;padding:20px;margin-bottom:15px}
.recipe-header{background:#1565C0;color:#fff;padding:20px;border-radius:10px;margin-bottom:20px}
.recipe-title{font-size:24px;font-weight:600;margin-bottom:8px;font-family:'Lora',serif}
.recipe-tagline{font-size:14px;opacity:.9;margin-bottom:15px;font-style:italic}
.recipe-meta{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px;font-size:12px}
.recipe-meta-item{background:rgba(255,255,255,.1);padding:10px;border-radius:6px}
.recipe-meta-label{font-weight:600;display:block;margin-bottom:3px}
.recipe-section{margin-bottom:20px}
.recipe-section h3{font-size:16px;color:#1565C0;margin-bottom:12px;font-weight:600}
.ingredient-item{display:flex;align-items:flex-start;margin-bottom:8px;font-size:14px}
.ingredient-dot{color:#1565C0;margin-right:10px;font-weight:bold;flex-shrink:0}
.step-item{display:flex;align-items:flex-start;margin-bottom:12px;font-size:14px}
.step-number{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;background:#1565C0;color:#fff;border-radius:50%;margin-right:12px;font-weight:600;flex-shrink:0;font-size:12px}
.tip-box{background:#E3F2FD;border-left:4px solid #1565C0;padding:15px;border-radius:6px;margin-bottom:20px}
.tip-title{font-weight:600;color:#1565C0;margin-bottom:8px;font-size:14px}
.loading{display:none}
.loading.show{display:block}
.hidden{display:none}
.button-group{display:flex;gap:10px}
.button-group button{flex:1}
.button-group .btn-secondary{margin-bottom:0}
.error-box{background:#FAEAEA;border:1px solid #D85A5A;border-radius:8px;padding:15px;margin-bottom:15px;color:#A32D2D;display:none;font-size:14px}
.error-box.show{display:block}
</style>
</head>
<body>
<div class="wrap">
  <div class="hero">
    <h1>✨ AI Kitchen Laboratory</h1>
  </div>

  <div id="errorBox" class="error-box"></div>

  <form id="recipeForm">
    <div class="form-group">
      <label class="label">What would you like to make?</label>
      <textarea id="dish" placeholder="e.g. Vegan macarons, chocolate cake without eggs..." required></textarea>
    </div>

    <div class="form-group">
      <label class="label">Allergies & Intolerances</label>
      <div class="chips" id="allergies"></div>
    </div>

    <div class="form-group">
      <label class="label">Cuisine</label>
      <div class="chips" id="cuisine"></div>
    </div>

    <div class="form-group">
      <label class="label">Meal Type</label>
      <div class="chips" id="meal"></div>
    </div>

    <button type="submit" class="btn">
      <span id="btnText">✨ Make My Recipe</span>
      <span class="loading" id="btnLoading">Chef is cooking...</span>
    </button>
  </form>

  <div id="result" class="hidden">
    <div id="recipeCard"></div>
    
    <div class="button-group">
      <button class="btn" onclick="downloadPDF()">📥 Download PDF</button>
      <button class="btn" onclick="window.location.href='scene-3.html'">🎓 See Courses</button>
    </div>
    
    <button class="btn btn-secondary" onclick="location.reload()">Make Another</button>
  </div>
</div>

<script>
const allergies = ['Gluten', 'Nuts', 'Dairy', 'Eggs', 'Soy', 'Fish', 'Shellfish'];
const cuisines = ['Italian', 'French', 'Asian', 'Mexican', 'Indian'];
const meals = ['Breakfast', 'Lunch', 'Dinner', 'Dessert'];
let recipeData = null;

function setupChips(containerId, items) {
  const container = document.getElementById(containerId);
  items.forEach(item => {
    const chip = document.createElement('button');
    chip.type = 'button';
    chip.className = 'chip';
    chip.textContent = item;
    chip.addEventListener('click', (e) => {
      e.preventDefault();
      chip.classList.toggle('selected');
    });
    container.appendChild(chip);
  });
}

function getSelectedChips(containerId) {
  return Array.from(document.getElementById(containerId).querySelectorAll('.chip.selected'))
    .map(c => c.textContent);
}

function showError(msg) {
  const errorBox = document.getElementById('errorBox');
  errorBox.textContent = msg;
  errorBox.classList.add('show');
}

function hideError() {
  document.getElementById('errorBox').classList.remove('show');
}

document.getElementById('recipeForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  hideError();
  
  const dish = document.getElementById('dish').value;
  const allergiesList = getSelectedChips('allergies');
  const cuisineList = getSelectedChips('cuisine');
  const mealList = getSelectedChips('meal');
  
  document.getElementById('recipeForm').style.display = 'none';
  document.getElementById('btnText').style.display = 'none';
  document.getElementById('btnLoading').classList.add('show');
  
  try {
    const userPrompt = `Create a vegan recipe for: ${dish}
Allergies to avoid: ${allergiesList.join(', ') || 'None'}
Cuisine preference: ${cuisineList.join(', ') || 'Any'}
Meal type: ${mealList.join(', ') || 'Any'}

IMPORTANT: This is a VEGAN recipe - no eggs, dairy, or animal products.

Respond ONLY in JSON format (no markdown, no extra text):
{
  "title": "Recipe Name",
  "tagline": "One line description",
  "prepTime": "X minutes",
  "cookTime": "X minutes",
  "servings": "2",
  "difficulty": "Easy/Medium/Hard",
  "ingredients": ["item 1", "item 2", "item 3"],
  "steps": ["step 1", "step 2", "step 3"],
  "tip": "Chef's tip here"
}`;

    const response = await fetch('https://fft-recipe.man-4bb.workers.dev', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        messages: [{
          role: 'user',
          content: userPrompt
        }]
      })
    });

    const data = await response.json();
    
    if (!response.ok) {
      throw new Error(data.error || 'Failed to generate recipe');
    }

    const content = data.content || data.text;
    let recipe;
    
    try {
      recipe = JSON.parse(content);
    } catch (e) {
      const jsonMatch = content.match(/\{[\s\S]*\}/);
      if (jsonMatch) {
        recipe = JSON.parse(jsonMatch[0]);
      } else {
        throw new Error('Invalid recipe format');
      }
    }
    
    recipeData = recipe;
    displayRecipe(recipe);
  } catch (error) {
    console.error('Error:', error);
    showError(`Error: ${error.message}. Please try again.`);
    document.getElementById('recipeForm').style.display = 'block';
    document.getElementById('btnText').style.display = 'block';
    document.getElementById('btnLoading').classList.remove('show');
  }
});

function displayRecipe(recipe) {
  const card = document.getElementById('recipeCard');
  card.innerHTML = `
    <div class="recipe-card" id="recipePDF">
      <div class="recipe-header">
        <div class="recipe-title">${recipe.title}</div>
        <div class="recipe-tagline">${recipe.tagline}</div>
        <div class="recipe-meta">
          <div class="recipe-meta-item"><div class="recipe-meta-label">Prep</div>${recipe.prepTime}</div>
          <div class="recipe-meta-item"><div class="recipe-meta-label">Cook</div>${recipe.cookTime}</div>
          <div class="recipe-meta-item"><div class="recipe-meta-label">Serves</div>${recipe.servings}</div>
          <div class="recipe-meta-item"><div class="recipe-meta-label">Level</div>${recipe.difficulty}</div>
        </div>
      </div>
      
      <div class="recipe-section">
        <h3>Ingredients</h3>
        ${recipe.ingredients.map(ing => `<div class="ingredient-item"><span class="ingredient-dot">●</span>${ing}</div>`).join('')}
      </div>
      
      <div class="recipe-section">
        <h3>Steps</h3>
        ${recipe.steps.map((step, i) => `<div class="step-item"><span class="step-number">${i+1}</span><div>${step}</div></div>`).join('')}
      </div>
      
      <div class="tip-box">
        <div class="tip-title">Chef MAN's Tip</div>
        ${recipe.tip}
      </div>
    </div>
  `;
  
  document.getElementById('recipeForm').style.display = 'none';
  document.getElementById('result').classList.remove('hidden');
}

function downloadPDF() {
  if (!recipeData) return;
  
  const element = document.getElementById('recipePDF');
  const opt = {
    margin: 10,
    filename: `${recipeData.title}.pdf`,
    image: { type: 'jpeg', quality: 0.98 },
    html2canvas: { scale: 2 },
    jsPDF: { orientation: 'portrait', unit: 'mm', format: 'a4' }
  };
  html2pdf().set(opt).from(element).save();
}

setupChips('allergies', allergies);
setupChips('cuisine', cuisines);
setupChips('meal', meals);
</script>
</body>
</html>
