<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chef Jessica's Recipe Creator</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary-pink: #FF1493; --bg: #FAF8F4; --text: #1A1A18; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body, html { height: 100%; overflow-x: hidden; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); }
        .screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; overflow-y: auto; background: var(--bg); transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .screen.below { transform: translateY(100%); }
        .screen.active { transform: translateY(0); }
        .wrap { max-width: 580px; margin: 0 auto; padding: 2rem 1.25rem 4rem; }
        .hero { background: var(--primary-pink); border-radius: 14px; padding: 2.2rem 1.5rem; margin-bottom: 1.5rem; text-align: center; }
        .hero h1 { font-family: 'Lora', serif; font-size: 32px; font-weight: 400; color: #fff; line-height: 1.1; }
        .hero h1 em { color: #000; font-style: italic; }
        input, textarea { width: 100%; padding: 1.1rem; border: 1px solid rgba(26,26,24,0.12); border-radius: 12px; margin-bottom: 1rem; font-size: 1rem; font-family: inherit; background: #fff; }
        h3 { font-size: 11px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: .1em; margin: 1.8rem 0 0.8rem; }
        .tag-group { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 0.5rem; }
        .tag { padding: 9px 18px; border: 1px solid rgba(26,26,24,0.12); border-radius: 20px; background: white; font-size: 14px; cursor: pointer; transition: all 0.2s; }
        .tag.active { background: var(--primary-pink); color: white; border-color: var(--primary-pink); }
        button#main-btn { background: var(--primary-pink); color: white; border: none; width: 100%; padding: 1.2rem; border-radius: 50px; font-size: 18px; font-weight: 600; cursor: pointer; margin-top: 1.2rem; }
        #ip-display { font-size: 11px; color: #aaa; margin-top: 15px; text-align: center; font-family: monospace; }
        #response { margin-top: 20px; padding: 20px; background: white; border-radius: 12px; display: none; border: 1px solid #eee; line-height: 1.6; }
    </style>
</head>
<body>

    <div id="scene-1" class="screen active">
        <div class="wrap">
            <div class="hero"><h1>Chef Jessica's <br><em>Recipe Creator</em></h1></div>
            <input type="email" id="user-email" placeholder="Email Address">
            <input type="tel" id="user-phone" placeholder="Phone Number">
            <button id="main-btn" onclick="toScene2()">Continue to Recipe →</button>
            <div id="ip-display">Connecting...</div>
        </div>
    </div>

    <div id="scene-2" class="screen below">
        <div class="wrap">
            <textarea id="user-input" rows="4" placeholder="What would you like to bake today?"></textarea>
            
            <h3>Allergies & Intolerances</h3>
            <div class="tag-group">
                <div class="tag">Gluten</div><div class="tag">Nuts</div><div class="tag">Dairy</div><div class="tag">Eggs</div><div class="tag">Soy</div>
            </div>

            <h3>Cuisine & Meal Type</h3>
            <div class="tag-group">
                <div class="tag">Italian</div><div class="tag">French</div><div class="tag">Asian</div><div class="tag">Dessert</div>
            </div>

            <h3>Dietary Preferences</h3>
            <div class="tag-group">
                <div class="tag">Vegan</div><div class="tag">Vegetarian</div><div class="tag">Halal</div><div class="tag">Kosher</div><div class="tag">Gluten-free</div>
            </div>

            <div id="response"></div>
            <button id="main-btn" onclick="runAI()">✨ Make My Recipe</button>
        </div>
    </div>

    <script>
        const API_URL = 'https://fft-recipe.man-4bb.workers.dev/chat';
        let lead = { email: '', phone: '', ip: '' };

        async function fetchIp() {
            try {
                const r = await fetch('https://ipapi.co/json/');
                const d = await r.json();
                lead.ip = d.ip + " - " + d.city + ", " + d.country_name;
                document.getElementById('ip-display').innerText = "ACCESS ID: " + lead.ip;
            } catch (e) { document.getElementById('ip-display').innerText = "Secure Connection Active"; }
        }
        fetchIp();

        document.querySelectorAll('.tag').forEach(t => {
            t.onclick = () => t.classList.toggle('active');
        });

        function toScene2() {
            lead.email = document.getElementById('user-email').value;
            lead.phone = document.getElementById('user-phone').value;
            if(!lead.email || !lead.phone) return alert("Required: Email & Phone");
            document.getElementById('scene-1').classList.remove('active');
            document.getElementById('scene-2').classList.add('active');
        }

        async function runAI() {
            const msg = document.getElementById('user-input').value;
            const tags = Array.from(document.querySelectorAll('.tag.active')).map(t => t.innerText);
            const box = document.getElementById('response');
            
            if(!msg) return alert("Please enter your recipe request.");
            
            box.style.display = 'block'; 
            box.innerText = "Consulting Chef Jessica's logic...";

            try {
                const r = await fetch(API_URL, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ message: msg, lead: lead, tags: tags })
                });
                const d = await r.json();
                box.innerHTML = d.response;
            } catch (e) { box.innerText = "Connection error. Please try again."; }
        }
    </script>
</body>
</html>
