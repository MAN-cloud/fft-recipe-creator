<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Chef Jessica's Recipe Creator</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Inter', sans-serif; background: #FAF8F4; color: #1A1A18; font-size: 16px; overflow-x: hidden; }
        .container { max-width: 600px; margin: 2rem auto; padding: 2rem; background: white; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .hero { background: #FF1493; color: white; padding: 2rem; border-radius: 14px; text-align: center; margin-bottom: 1.5rem; }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; }
        button { background: #FF1493; color: white; border: none; padding: 15px 30px; border-radius: 30px; font-weight: 600; cursor: pointer; width: 100%; }
        #response { margin-top: 20px; padding: 15px; background: #FFF0F5; border-radius: 8px; line-height: 1.6; }
    </style>
</head>
<body>
    <div class="container">
        <div class="hero">
            <h1>Recipe Creator</h1>
            <p>Chef Jessica's AI Assistant</p>
        </div>
        <textarea id="user-input" rows="4" placeholder="What would you like to bake today? (e.g. What is the ratio for Panacegg?)"></textarea>
        <button id="make-recipe">✨ Make My Recipe</button>
        <div id="response"></div>
    </div>

    <script>
        const API_URL = 'https://fft-recipe.man-4bb.workers.dev/chat';

        document.getElementById('make-recipe').addEventListener('click', async () => {
            const input = document.getElementById('user-input').value;
            const responseDiv = document.getElementById('response');
            
            if (!input) return;

            responseDiv.innerText = "Chef Jessica is thinking...";

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: input })
                });
                const data = await response.json();
                responseDiv.innerText = data.response;
            } catch (error) {
                responseDiv.innerText = "Chef Jessica couldn't finish the recipe. Please try again.";
                console.error(error);
            }
        });
    </script>
</body>
</html>
