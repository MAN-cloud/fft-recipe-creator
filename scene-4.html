<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Save Your Details</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial;background:#FAF8F4;color:#1A1A18;font-size:16px}
.wrap{max-width:580px;margin:0 auto;padding:20px}
.hero{background:#1565C0;border-radius:14px;padding:20px;text-align:center;color:#fff;margin-bottom:20px}
.hero h1{font-size:18px;margin:0}
.label{font-size:12px;font-weight:600;color:#888;text-transform:uppercase;margin-bottom:8px;display:block;margin-top:15px}
input,select{width:100%;padding:12px;border:1px solid #ddd;border-radius:8px;font-size:14px;margin-bottom:10px}
.btn{width:100%;padding:12px;background:#1565C0;color:#fff;border:none;border-radius:8px;font-weight:600;cursor:pointer;font-size:16px;margin-bottom:10px}
.btn:hover{background:#0D47A1}
.success{background:#E8F5E9;border:1px solid #66BB6A;border-radius:8px;padding:15px;margin-bottom:10px;color:#2E7D32;display:none}
.success.show{display:block}
</style>
</head>
<body>
<div class="wrap">
  <div class="hero">
    <h1>Stay Connected</h1>
  </div>

  <div class="success" id="success">✓ Thank you! Details saved.</div>

  <form onsubmit="submitForm(event)">
    <label class="label">Name</label>
    <input type="text" id="name" placeholder="Your name" required>

    <label class="label">Email</label>
    <input type="email" id="email" placeholder="your@email.com" required>

    <label class="label">Phone (Optional)</label>
    <input type="tel" id="phone" placeholder="+1 (555) 1234">

    <label class="label">Country</label>
    <select id="country" required>
      <option value="">Select country</option>
      <option value="USA">United States</option>
      <option value="UK">United Kingdom</option>
      <option value="Canada">Canada</option>
      <option value="Australia">Australia</option>
      <option value="Spain">Spain</option>
    </select>

    <button type="submit" class="btn">Save Details</button>
  </form>
</div>

<script>
function submitForm(e){
  e.preventDefault();
  console.log({
    name:document.getElementById('name').value,
    email:document.getElementById('email').value,
    phone:document.getElementById('phone').value,
    country:document.getElementById('country').value,
    timestamp:new Date().toISOString()
  });
  document.getElementById('success').classList.add('show');
  setTimeout(()=>{window.location.href='https://www.freefromthat.com'},2000);
}
</script>
</body>
</html>
